{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MATAN{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f5e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #777;
            padding: 15px 20px;
            color: white;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            text-decoration: none;
            color: white;
            background: black;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .login-btn {
            background: #2ecc71;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
        }

        .login-btn:hover {
            background: #27ae60;
        }

        footer {
            background: #777;
            text-align: center;
            padding: 10px;
            color: white;
            margin-top: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="logo">MATAN</div>
        <nav>
            {% if user.is_authenticated %}
                <div class="user-info">
                    <a href="{% url 'app:profile' %}" class="username">{{ user.username }}</a>
                    <a href="{% url 'app:logout' %}" class="nav-btn">Выход</a>
                </div>
            {% else %}
                <a href="{% url 'app:login' %}" class="login-btn">Войти</a>
                <a href="{% url 'app:signup' %}" class="nav-btn">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Контакты: @Artem_hvhv</p>
    </footer>
</body>
</html>
