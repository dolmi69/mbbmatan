{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATAN - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <div class="logo">MATAN</div>
        <nav>
            <a href="{% url 'app:home' %}" class="nav-btn">Главная</a>
            {% if user.is_authenticated %}
                <a href="{% url 'app:profile' %}" class="nav-btn">Профиль</a>
            {% else %}
                <a href="{% url 'app:login' %}" class="nav-btn">Войти</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Контакты: </p>
    </footer>
</body>
</html>
