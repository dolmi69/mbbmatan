{% load static %}
<div class="ai-chat-widget" id="aiChatWidget">
    <div class="ai-chat-icon" id="aiChatIcon">
        {% include 'mascot/neutral.html' %}
    </div>
    <div class="ai-chat-window" id="aiChatWindow" style="display: none;">
        <div class="ai-chat-header">
            <h3><i class="fas fa-robot"></i> AI-Помощник</h3>
            <div class="ai-chat-actions">
                <a href="{% url 'app:ai_chat_fullscreen' %}" class="fullscreen-btn" target="_blank">
                    <i class="fas fa-expand"></i>
                </a>
                <button id="aiChatClose" class="close-btn">&times;</button>
            </div>
        </div>
        <div class="ai-chat-messages" id="aiChatMessages">
            {% for msg in widget_history %}
                <div class="message {{ msg.role }}">
                    <div class="message-content">{{ msg.content }}</div>
                </div>
            {% empty %}
                <div class="message assistant">
                    <div class="message-content">Здравствуйте! Я ваш AI-помощник. Задайте мне вопрос по математике или физике!</div>
                </div>
            {% endfor %}
        </div>
        <div class="ai-chat-input">
            <textarea id="aiChatInput" placeholder="Введите сообщение..." rows="1"></textarea>
            <button id="aiChatSend"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<style>
.ai-chat-widget {
    position: fixed;
    bottom: 150px;   /* ← подняли выше (было 20px) */
    right: 20px;
    z-index: 9999;
}
.ai-chat-icon {
    width: 100px;     /* ← чуть больше */
    height: 100px;
    background: #5a6e7c;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: transform 0.2s;
    overflow: hidden;
}
.ai-chat-icon:hover { transform: scale(1.1); }
.ai-chat-icon svg {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    transform: scale(1.3);
}
.ai-chat-window {
    position: absolute;
    bottom: 80px;    /* ← расстояние от иконки до окна */
    right: 0;
    width: 400px;    /* ← шире (было 350px) */
    height: 550px;   /* ← выше (было 500px) */
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.ai-chat-header {
    background: #5a6e7c;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.ai-chat-header h3 { margin: 0; font-size: 16px; }
.ai-chat-actions { display: flex; gap: 10px; }
.fullscreen-btn, .close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
.ai-chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.message {
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 15px;
    word-wrap: break-word;
}
.message.user {
    align-self: flex-end;
    background: #3498db;
    color: white;
}
.message.assistant {
    align-self: flex-start;
    background: #f0f0f0;
    color: #333;
}
.ai-chat-input {
    padding: 15px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 10px;
}
.ai-chat-input textarea {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 20px;
    resize: none;
    max-height: 100px;
}
.ai-chat-input button {
    background: #5a6e7c;
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    transition: background 0.2s;
}
.ai-chat-input button:hover { background: #4a5c6a; }
@media (max-width: 480px) {
    .ai-chat-window {
        width: calc(100vw - 40px);
        height: 450px;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const icon = document.getElementById('aiChatIcon');
    const windowEl = document.getElementById('aiChatWindow');
    const closeBtn = document.getElementById('aiChatClose');
    const sendBtn = document.getElementById('aiChatSend');
    const input = document.getElementById('aiChatInput');
    const messagesContainer = document.getElementById('aiChatMessages');
    let sessionId = '{{ session_id|default:"" }}';

    icon.addEventListener('click', () => windowEl.style.display = 'flex');
    closeBtn.addEventListener('click', () => windowEl.style.display = 'none');

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;
        addMessage(message, 'user');
        input.value = '';
        try {
            const response = await fetch('{% url "app:ai_chat_api" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ message, session_id: sessionId })
            });
            const data = await response.json();
            if (data.success) {
                addMessage(data.message, 'assistant');
                sessionId = data.session_id;
            } else {
                addMessage('Ошибка: ' + (data.error || 'Неизвестная ошибка'), 'assistant error');
            }
        } catch (error) {
            addMessage('Ошибка соединения с сервером', 'assistant error');
        }
    }

    function addMessage(text, role) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
});
</script>
