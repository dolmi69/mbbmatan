{% extends 'base.html' %}
{% load static %}

{% block title %}Ошибка | MATAN{% endblock %}

{% block content %}
<style>
    .error-container {
        max-width: 550px;
        margin: 60px auto;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        text-align: center;
    }
    .error-icon {
        font-size: 70px;
        color: #e74c3c;
        margin-bottom: 20px;
    }
    .error-title {
        color: #2c3e50;
        margin-bottom: 20px;
    }
    .error-message {
        color: #555;
        margin-bottom: 35px;
        font-size: 18px;
    }
    .mascot-wrapper {
        max-width: 200px;
        margin: 0 auto 30px;
    }
</style>

<div class="error-container">
    <div class="error-icon">
        <i class="fas fa-exclamation-circle"></i>
    </div>
    <div class="mascot-wrapper">
        {% include 'mascot/wrong.html' %}
    </div>
    <h2 class="error-title">Упс! Что-то пошло не так</h2>
    <div class="error-message">
        {{ message|default:"Произошла непредвиденная ошибка." }}
    </div>
    <div style="display: flex; gap: 15px; justify-content: center;">
        <a href="{% url 'app:home' %}" class="btn btn-primary"><i class="fas fa-home"></i> На главную</a>
        <a href="javascript:history.back()" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Назад</a>
    </div>
</div>
{% endblock %}
