{% extends 'base.html' %}
{% load static %}

{% block title %}Ошибка {{ error_code }} | MATAN{% endblock %}

{% block content %}
<style>
    .error-container {
        max-width: 550px;
        margin: 60px auto;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        text-align: center;
    }
    .error-icon {
        font-size: 70px;
        color: #e74c3c;
        margin-bottom: 20px;
    }
    .error-title {
        color: #2c3e50;
        margin-bottom: 20px;
    }
    .error-message {
        color: #555;
        margin-bottom: 35px;
        font-size: 18px;
    }
    .mascot-wrapper {
        width: 250px;
        margin: 0 auto 30px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .mascot-wrapper svg {
        width: 100%;
        height: auto;
        display: block;
    }
    @media (max-width: 480px) {
        .error-container {
            margin: 30px 15px;
            padding: 25px;
        }
        .error-icon {
            font-size: 50px;
        }
        .error-title {
            font-size: 24px;
        }
    }
</style>

<div class="error-container">
    <div class="error-icon">
        <i class="fas fa-exclamation-circle"></i>
    </div>
    <div class="mascot-wrapper">
        {% include 'mascot/wrong.html' %}
    </div>
    <h2 class="error-title">Ошибка {{ error_code }}</h2>
    <div class="error-message">
        {{ message }}
    </div>
    <div style="display: flex; gap: 15px; justify-content: center;">
        <a href="{% url 'app:home' %}" class="btn btn-primary"><i class="fas fa-home"></i> На главную</a>
        <a href="javascript:history.back()" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Назад</a>
    </div>
</div>
{% endblock %}
