{% extends 'base.html' %}
{% load static %}

{% block title %}Удаление заметки | MATAN{% endblock %}

{% block content %}
<style>
    .delete-container {
        max-width: 550px;
        margin: 60px auto;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        text-align: center;
    }
    .delete-icon {
        font-size: 60px;
        color: #e74c3c;
        margin-bottom: 20px;
    }
    .delete-title {
        color: #2c3e50;
        margin-bottom: 15px;
    }
    .delete-text {
        color: #555;
        margin-bottom: 35px;
        font-size: 18px;
    }
    .note-title-highlight {
        font-weight: 700;
        color: #e74c3c;
    }
    .delete-actions {
        display: flex;
        gap: 20px;
        justify-content: center;
    }
    .btn-delete {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-delete:hover {
        background: #c0392b;
    }
    .btn-cancel {
        background: #3498db;
        color: white;
        padding: 12px 30px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
    }
    .btn-cancel:hover {
        background: #2980b9;
    }
</style>

<div class="delete-container">
    <div class="delete-icon">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h2 class="delete-title">Удалить заметку?</h2>
    <p class="delete-text">
        Вы уверены, что хотите удалить заметку <br>
        <span class="note-title-highlight">"{{ note.title }}"</span>?
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="delete-actions">
            <button type="submit" class="btn-delete">Да, удалить</button>
            <a href="{% url 'app:note_list' %}" class="btn-cancel">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
