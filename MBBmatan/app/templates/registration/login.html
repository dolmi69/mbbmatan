{% extends 'base.html' %}
{% load static %}

{% block title %}Вход | MATAN{% endblock %}

{% block content %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 60px auto;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }
    .auth-container h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #2c3e50;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        transition: border 0.2s;
    }
    .form-group input:focus {
        border-color: #3498db;
        outline: none;
        box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
    }
    .btn-submit {
        width: 100%;
        padding: 14px;
        background: #2ecc71;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-submit:hover {
        background: #27ae60;
    }
    .auth-links {
        text-align: center;
        margin-top: 20px;
    }
    .auth-links a {
        color: #3498db;
        text-decoration: none;
    }
    .errorlist {
        color: #e74c3c;
        list-style: none;
        padding: 0;
        margin-top: 5px;
    }
    @media (max-width: 600px) {
        .auth-container { margin: 20px 15px; padding: 25px 20px; border-radius: 14px; }
        .auth-container h2 { font-size: 20px; margin-bottom: 22px; }
        .form-group input, .btn-submit { font-size: 15px; padding: 12px 14px; }
    }
</style>

<div class="auth-container">
    <h2><i class="fas fa-sign-in-alt"></i> Вход в MATAN</h2>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
            <div class="alert alert-error">Неверный логин или пароль. Попробуйте снова.</div>
        {% endif %}
        <div class="form-group">
            <input type="text" name="username" placeholder="Имя пользователя" required autofocus>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Пароль" required>
        </div>
        <button type="submit" class="btn-submit">Войти</button>
        <div class="auth-links">
            <a href="{% url 'app:signup' %}">Нет аккаунта? Зарегистрируйтесь</a>
        </div>
    </form>
</div>
{% endblock %}
