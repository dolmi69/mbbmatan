{% extends 'base.html' %}
{% block title %}Результаты теста{% endblock %}

{% block content %}
<div class="result-container">
    <div class="result-card">
        <h2 class="result-title">Ваш результат:</h2>
        <div class="score">
            Правильных ответов: <span class="correct">{{ score }}</span> из {{ total }}
        </div>

        <div class="progress-bar">
            <div class="progress" style="width: {{ progress }}%"></div>
        </div>

        <div class="actions">
            <a href="{% url 'app:formula_quiz' %}" class="btn">Попробовать снова</a>
            <a href="{% url 'app:home' %}" class="btn">На главную</a>
        </div>
    </div>
</div>
{% endblock %}
