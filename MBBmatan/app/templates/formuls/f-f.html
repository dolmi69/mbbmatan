{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATAN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f5e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #777;
            padding: 15px 20px;
            color: white;
            position: relative;
        }

        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        nav a.nav-btn {
            text-decoration: none;
            color: white;
            background: black;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .login-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            overflow: hidden;
        }

        .login-btn a {
            display: block;
            padding: 10px 15px;
            color: inherit;
            text-decoration: none;
        }

        .login-btn:hover {
            background: #27ae60;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;
            margin-top: 80px;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: #f0f0f0;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .formula {
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: #333;
            flex-grow: 1;
            text-align: center;
        }

        .heart-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            transition: transform 0.3s ease;
        }

        .heart {
            font-size: 32px;
            color: #666;
            transition: color 0.3s ease;
        }

        .heart.active {
            color: #ff4081;
        }

        footer {
            background: #777;
            text-align: center;
            padding: 10px;
            color: white;
            margin-top: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: text-decoration 0.3s;
        }

        .username:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MATAN</div>
        <nav>
            <a href="/home/" class="nav-btn active nav-center">ГЛАВНАЯ</a>
            {% if user.is_authenticated %}
            <div class="user-info">
                <a href="/profile" class="username">{{ user.username }}</a>
            </div>
            {% else %}
            <button class="login-btn">
                <a href="{% url 'app:login' %}" class="login-link">Перейти к авторизации</a>
            </button>
            {% endif %}
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="formula">E = mc<sup>2</sup></div>
            <button class="heart-btn" onclick="toggleLike(this)">
                <div class="heart">♥</div>
            </button>
        </div>

        <div class="container">
            <div class="formula">E = mc<sup>2</sup></div>
            <button class="heart-btn" onclick="toggleLike(this)">
                <div class="heart">♥</div>
            </button>
        </div>

        <div class="container">
            <div class="formula">E = mc<sup>2</sup></div>
            <button class="heart-btn" onclick="toggleLike(this)">
                <div class="heart">♥</div>
            </button>
        </div>
    </main>

    <footer>
        <p>Контакты: </p>
    </footer>

    <script>
        function toggleLike(button) {
            const heart = button.querySelector('.heart');
            heart.classList.toggle('active');
        }
    </script>
</body>
</html>
