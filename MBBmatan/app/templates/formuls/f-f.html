{% extends 'base.html' %}
{% load static %}

{% block title %}Формулы физики | MATAN{% endblock %}

{% block content %}
<style>
    .formulas-grid {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 600px;
        margin: 0 auto;
    }
    .formula-card {
        background: white;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .formula-text {
        font-size: 28px;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        color: #2c3e50;
    }
    .heart-btn {
        background: none;
        border: none;
        font-size: 32px;
        cursor: pointer;
        color: #ccc;
        transition: color 0.2s, transform 0.2s;
        padding: 5px;
    }
    .heart-btn.active {
        color: #e74c3c;
    }
    .heart-btn:hover {
        transform: scale(1.2);
    }
    .page-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .page-header h1 {
        color: #2c3e50;
    }
    @media (max-width: 600px) {
        .formulas-container { padding: 18px; margin: 15px; border-radius: 14px; }
        .page-header h1 { font-size: 22px; }
        .formula-card { padding: 14px; gap: 10px; flex-wrap: wrap; }
        .formula-text { font-size: 18px; word-break: break-word; }
        .heart-btn { font-size: 26px; }
    }
</style>

<div class="page-header">
    <h1><i class="fas fa-atom"></i> Формулы физики</h1>
    <p>Добавляйте формулы в избранное ❤️</p>
</div>

<div class="formulas-grid">
    <div class="formula-card">
        <div class="formula-text">E = mc²</div>
        <button class="heart-btn" data-formula="E = mc²">
            <i class="fas fa-heart"></i>
        </button>
    </div>
    <div class="formula-card">
        <div class="formula-text">F = ma</div>
        <button class="heart-btn" data-formula="F = ma">
            <i class="fas fa-heart"></i>
        </button>
    </div>
    <div class="formula-card">
        <div class="formula-text">V = IR</div>
        <button class="heart-btn" data-formula="V = IR">
            <i class="fas fa-heart"></i>
        </button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const favorites = {{ favorites_json|safe|default:"[]" }};
    document.querySelectorAll('.heart-btn').forEach(btn => {
        const formula = btn.dataset.formula;
        if (favorites.includes(formula)) {
            btn.classList.add('active');
        }
        btn.addEventListener('click', async function(e) {
            e.preventDefault();
            const heart = this;
            const formulaText = this.dataset.formula;
            try {
                const response = await fetch('{% url "app:toggle_favorite" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: `formula_text=${encodeURIComponent(formulaText)}`
                });
                const data = await response.json();
                if (data.status === 'added') {
                    heart.classList.add('active');
                } else if (data.status === 'removed') {
                    heart.classList.remove('active');
                }
            } catch (error) {
                if (error.status === 403) {
                    window.location.href = '{% url "app:login" %}';
                }
            }
        });
    });
</script>
{% endblock %}
