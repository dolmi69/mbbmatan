{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика - MATAN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f5e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #777;
            padding: 15px 20px;
            color: white;
            position: relative;
        }

        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        nav a.nav-btn {
            text-decoration: none;
            color: white;
            background: black;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .login-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            overflow: hidden;
        }

        .login-btn a {
            display: block;
            padding: 10px 15px;
            color: inherit;
            text-decoration: none;
        }

        .login-btn:hover {
            background: #27ae60;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;
            margin-top: 80px;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: #f0f0f0;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .formula {
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: #333;
            flex-grow: 1;
            text-align: center;
        }

        .heart-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            transition: transform 0.3s ease;
        }

        .heart {
            font-size: 32px;
            color: #666;
            transition: color 0.3s ease;
        }

        .heart.active {
            color: #ff4081;
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        footer {
            background: #777;
            text-align: center;
            padding: 10px;
            color: white;
            margin-top: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: text-decoration 0.3s;
        }

        .username:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MATAN</div>
        <nav>
            <a href="{% url 'app:home' %}" class="nav-btn active nav-center">ГЛАВНАЯ</a>
            {% if user.is_authenticated %}
            <div class="user-info">
                <a href="{% url 'app:profile' %}" class="username">{{ user.username }}</a>
                <form action="{% url 'app:logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Выйти</button>
                </form>
            </div>
            {% else %}
            <button class="login-btn">
                <a href="{% url 'app:login' %}" class="login-link">Перейти к авторизации</a>
            </button>
            {% endif %}
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="formula">E = mc<sup>2</sup></div>
            <button class="heart-btn" data-formula="E = mc²">
                <div class="heart">♥</div>
            </button>
        </div>

        <div class="container">
            <div class="formula">F = ma</div>
            <button class="heart-btn" data-formula="F = ma">
                <div class="heart">♥</div>
            </button>
        </div>

        <div class="container">
            <div class="formula">V = IR</div>
            <button class="heart-btn" data-formula="V = IR">
                <div class="heart">♥</div>
            </button>
        </div>
    </main>

    <footer>
        <p>Контакты</p>
    </footer>

    <script>
        document.querySelectorAll('.heart-btn').forEach(btn => {
            btn.addEventListener('click', async function() {
                const heart = this.querySelector('.heart');
                const formulaText = this.dataset.formula;

                try {
                    const response = await fetch('{% url "app:toggle_favorite" %}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: `formula_text=${encodeURIComponent(formulaText)}`
                    });

                    const data = await response.json();
                    if(data.status === 'added') {
                        heart.classList.add('active');
                    } else if(data.status === 'removed') {
                        heart.classList.remove('active');
                    }
                } catch(error) {
                    if(error.status === 403) {
                        window.location.href = '{% url "app:login" %}';
                    }
                    console.error('Error:', error);
                }
            });
        });
    </script>
</body>
</html>
