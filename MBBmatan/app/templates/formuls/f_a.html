{% extends 'base.html' %}
{% load static %}

{% block title %}Формулы алгебры | MATAN{% endblock %}

{% block content %}
<style>
    .formulas-container {
        max-width: 900px;
        margin: 30px auto;
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }
    h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 30px;
    }
    .formula-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
        margin-bottom: 15px;
        background: #fafafa;
        border-radius: 15px;
        border: 1px solid #eee;
    }
    .formula-text {
        font-size: 24px;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        color: #2c3e50;
    }
    .heart-btn {
        background: none;
        border: none;
        font-size: 32px;
        cursor: pointer;
        color: #ccc;
        transition: color 0.2s;
        padding: 5px 10px;
    }
    .heart-btn.active { color: #e74c3c; }
    .heart-btn:hover { transform: scale(1.2); }
</style>

<div class="formulas-container">
    <h1><i class="fas fa-square-root-alt"></i> Формулы алгебры</h1>
    {% for formula in formulas %}
        <div class="formula-card">
            <div class="formula-text">{{ formula.formula }}</div>
            <button class="heart-btn" data-formula="{{ formula.formula }}">
                <i class="fas fa-heart"></i>
            </button>
        </div>
    {% empty %}
        <p style="text-align: center;">Пока нет формул.</p>
    {% endfor %}
</div>
{% endblock %}

{% block extra_js %}
<script>
    const favorites = {{ favorites_json|safe }};
    document.querySelectorAll('.heart-btn').forEach(btn => {
        const formula = btn.dataset.formula;
        if (favorites.includes(formula)) {
            btn.classList.add('active');
        }
        btn.addEventListener('click', async function(e) {
            e.preventDefault();
            const heart = this;
            const formulaText = this.dataset.formula;
            try {
                const response = await fetch('{% url "app:toggle_favorite" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: `formula_text=${encodeURIComponent(formulaText)}`
                });
                const data = await response.json();
                if (data.status === 'added') {
                    heart.classList.add('active');
                } else if (data.status === 'removed') {
                    heart.classList.remove('active');
                }
            } catch (error) {
                console.error('Ошибка:', error);
            }
        });
    });
</script>
{% endblock %}
