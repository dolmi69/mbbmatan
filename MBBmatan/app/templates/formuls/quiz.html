{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Тест по формулам</h2>
    <form method="post">
        {% csrf_token %}
        {% for question in questions %}
        <div class="question">
            <h4>{{ question.formula }}</h4>
            {% for option in question.options %}
            <label>
                <input type="radio"
                       name="question_{{ question.id }}"
                       value="{{ option }}"
                       required>
                {{ option }}
            </label>
            {% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="btn">Отправить ответы</button>
    </form>
</div>
{% endblock %}
